<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tip Calculator</title>
     <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />
</head>
<body
style="background-color: darkblue;"
>
    
  <div
    class="
      w-25
      bg-light
      rounded
      shadow
      border
      mx-auto
      mt-5
      p-4
    "
  >

    <h1 class="text-center mb-3"
     style="background-color: orangered;">
      Tip Calculator
    </h1>

    <form
      class="
        d-flex
        flex-column
        gap-3
        align-items-center
        w-100
        p-3
      "
     
    >

      <!-- Bill Amount -->

      <label for="billAmount">
        Enter Bill Amount
      </label>

      <input
        type="number"
        id="billAmount"
        class="form-control"
      />

      <!-- Service -->

      <label for="service">
        How was the service?
      </label>

      <select
        id="service"
        class="form-select"
      >

        <option value="0.25">
          25% - Top Notch
        </option>

        <option value="0.20">
          20% - Excellent
        </option>

        <option value="0.15">
          15% - Good
        </option>

        <option value="0.10">
          10% - Bad
        </option>

        <option value="0.05">
          5% - Worst
        </option>

      </select>

      <!-- People -->

      <label for="people">
        Total Number of People
      </label>

      <input
        type="number"
        id="people"
        class="form-control"
      />

      <!-- Button -->

      <button
        type="submit"
        class="btn btn-primary"
      >
        Calculate
      </button>

    </form>

    <!-- Result -->

    <div
      class="
        fw-bold
        text-center
        mt-3
      "
      id="result"

     
    >

      Each Person Pays :

      ₹ <span id="amount">0</span>

    </div>

  </div>










     <!-- Scripts -->
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <script src="script.js"></script>
</body>
</html>

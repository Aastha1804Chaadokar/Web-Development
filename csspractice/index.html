<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login & Registration</title>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --blue: #3D5EF5;
      --blue-dark: #2d4de0;
      --blue-light: #5b7bff;
      --bg: #3D5EF5;
      --card: #ffffff;
      --text: #1a1a2e;
      --muted: #9ea8c0;
      --border: #e2e6f0;
      --link: #3D5EF5;
    }

    body {
      font-family: 'Sora', sans-serif;
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 32px;
      padding: 40px 20px;
      position: relative;
      overflow: hidden;
    }

    /* Subtle background circles for depth */
    body::before {
      content: '';
      position: absolute;
      width: 500px; height: 500px;
      border-radius: 50%;
      background: rgba(255,255,255,0.06);
      top: -150px; left: -100px;
      pointer-events: none;
    }
    body::after {
      content: '';
      position: absolute;
      width: 350px; height: 350px;
      border-radius: 50%;
      background: rgba(255,255,255,0.05);
      bottom: -80px; right: -60px;
      pointer-events: none;
    }

    .card {
      background: var(--card);
      border-radius: 20px;
      padding: 44px 40px 36px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 24px 60px rgba(0,0,0,0.18);
      animation: slideUp 0.5s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    .card:nth-child(2) { animation-delay: 0.1s; }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(30px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .card-title {
      font-size: 28px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 32px;
      position: relative;
      display: inline-block;
    }

    .card-title::after {
      content: '';
      position: absolute;
      left: 0; bottom: -6px;
      width: 36px; height: 3px;
      background: var(--blue);
      border-radius: 2px;
    }

    .field {
      display: flex;
      align-items: center;
      gap: 14px;
      border-bottom: 1.5px solid var(--border);
      padding: 12px 0;
      margin-bottom: 6px;
      position: relative;
      transition: border-color 0.2s;
    }

    .field:focus-within {
      border-color: var(--blue);
    }

    .field-icon {
      width: 20px;
      height: 20px;
      flex-shrink: 0;
      color: var(--muted);
    }

    .field input {
      border: none;
      outline: none;
      width: 100%;
      font-family: 'Sora', sans-serif;
      font-size: 14px;
      color: var(--text);
      background: transparent;
    }

    .field input::placeholder { color: var(--muted); }

    .eye-btn {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--muted);
      padding: 0;
      display: flex;
      align-items: center;
      flex-shrink: 0;
      transition: color 0.2s;
    }
    .eye-btn:hover { color: var(--blue); }

    .fields-group { margin-bottom: 22px; }

    .row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin: 18px 0 26px;
    }

    .checkbox-label {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: var(--text);
      cursor: pointer;
    }

    .checkbox-label input[type="checkbox"] {
      appearance: none;
      width: 16px; height: 16px;
      border: 1.5px solid var(--muted);
      border-radius: 4px;
      flex-shrink: 0;
      cursor: pointer;
      position: relative;
      transition: border-color 0.2s, background 0.2s;
    }

    .checkbox-label input[type="checkbox"]:checked {
      background: var(--blue);
      border-color: var(--blue);
    }

    .checkbox-label input[type="checkbox"]:checked::after {
      content: '';
      position: absolute;
      left: 3px; top: 1px;
      width: 5px; height: 8px;
      border: 2px solid white;
      border-top: none; border-left: none;
      transform: rotate(45deg);
    }

    .forgot-link {
      font-size: 13px;
      color: var(--link);
      text-decoration: none;
      font-weight: 600;
    }
    .forgot-link:hover { text-decoration: underline; }

    .btn {
      width: 100%;
      padding: 15px;
      background: var(--blue);
      color: white;
      font-family: 'Sora', sans-serif;
      font-size: 15px;
      font-weight: 700;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
      letter-spacing: 0.3px;
      box-shadow: 0 6px 20px rgba(61,94,245,0.35);
    }

    .btn:hover {
      background: var(--blue-dark);
      transform: translateY(-1px);
      box-shadow: 0 10px 28px rgba(61,94,245,0.45);
    }

    .btn:active {
      transform: translateY(0);
      box-shadow: 0 4px 12px rgba(61,94,245,0.3);
    }

    .footer-text {
      text-align: center;
      font-size: 13px;
      color: var(--muted);
      margin-top: 20px;
    }

    .footer-text a {
      color: var(--link);
      text-decoration: none;
      font-weight: 600;
    }
    .footer-text a:hover { text-decoration: underline; }

    @media (max-width: 860px) {
      body { flex-direction: column; align-items: center; }
    }

    @media (max-width: 480px) {
      .card { padding: 32px 24px 28px; }
    }
  </style>
</head>
<body>

  <!-- LOGIN CARD -->
  <div class="card">
    <h1 class="card-title">Login</h1>

    <div class="fields-group">
      <div class="field">
        <!-- Email icon -->
        <svg class="field-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <rect x="2" y="4" width="20" height="16" rx="2"/>
          <path d="M2 7l10 7 10-7"/>
        </svg>
        <input type="email" placeholder="Enter your email" autocomplete="email"/>
      </div>

      <div class="field">
        <!-- Lock icon -->
        <svg class="field-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <rect x="5" y="11" width="14" height="10" rx="2"/>
          <path d="M8 11V7a4 4 0 0 1 8 0v4"/>
        </svg>
        <input type="password" id="login-pw" placeholder="Confirm a password"/>
        <button class="eye-btn" onclick="togglePw('login-pw', this)" aria-label="Toggle password">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
        </button>
      </div>
    </div>

    <div class="row">
      <label class="checkbox-label">
        <input type="checkbox"/> Remember me
      </label>
      <a href="#" class="forgot-link">Forgot password?</a>
    </div>

    <button class="btn">Login Now</button>
    <p class="footer-text">Don't have an account? <a href="#">Signup now</a></p>
  </div>

  <!-- REGISTRATION CARD -->
  <div class="card">
    <h1 class="card-title">Registration</h1>

    <div class="fields-group">
      <div class="field">
        <!-- Person icon -->
        <svg class="field-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="8" r="4"/>
          <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
        </svg>
        <input type="text" placeholder="Enter your name" autocomplete="name"/>
      </div>

      <div class="field">
        <!-- Email icon -->
        <svg class="field-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <rect x="2" y="4" width="20" height="16" rx="2"/>
          <path d="M2 7l10 7 10-7"/>
        </svg>
        <input type="email" placeholder="Enter your email" autocomplete="email"/>
      </div>

      <div class="field">
        <!-- Lock icon -->
        <svg class="field-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <rect x="5" y="11" width="14" height="10" rx="2"/>
          <path d="M8 11V7a4 4 0 0 1 8 0v4"/>
        </svg>
        <input type="password" placeholder="Create a password"/>
      </div>

      <div class="field">
        <!-- Lock icon -->
        <svg class="field-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <rect x="5" y="11" width="14" height="10" rx="2"/>
          <path d="M8 11V7a4 4 0 0 1 8 0v4"/>
        </svg>
        <input type="password" id="reg-pw" placeholder="Confirm a password"/>
        <button class="eye-btn" onclick="togglePw('reg-pw', this)" aria-label="Toggle password">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
        </button>
      </div>
    </div>

    <label class="checkbox-label" style="margin-bottom: 26px; display:flex;">
      <input type="checkbox"/> I accept all terms &amp; conditions
    </label>

    <button class="btn">Register Now</button>
    <p class="footer-text">Already have an account? <a href="#">Login now</a></p>
  </div>

  <script>
    function togglePw(id, btn) {
      const input = document.getElementById(id);
      const isText = input.type === 'text';
      input.type = isText ? 'password' : 'text';
      btn.style.color = isText ? '' : 'var(--blue)';
    }
  </script>
</body>
</html>
